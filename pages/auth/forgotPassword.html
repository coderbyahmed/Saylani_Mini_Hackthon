<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password</title>
    <link rel="stylesheet" href="../../css/auth/modern-style/forgotPassword.css" />
    <link rel="stylesheet" href="../../css/ui/toast.css" />
    <link rel="stylesheet" href="../../css/ui/loader.css" />
</head>

<body>

    <!-- ============================================================
         FORGOT PASSWORD FORM
         ============================================================ -->
    <form id="forgotPasswordForm" method="post" autocomplete="on">

        <!-- ============================================================
             AUTH HEADER
             ============================================================ -->
        <div class="auth-header">

            <span class="auth-badge">
                Reset Password
            </span>

            <h1 class="auth-title">
                Forgot Password?
            </h1>

            <p class="auth-description">
                Enter your email address and we'll send you a link to reset your password.
            </p>

        </div>

        <!-- ============================================================
             ACTIVE FIELDS
             ============================================================ -->

        <!-- Email Address -->
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" placeholder="Enter your email address" autocomplete="email"
         />
        </div>

        <!-- ============================================================
             SUBMIT BUTTON
             ============================================================ -->
        <button type="submit" id="submitButton" class="btn-primary">Send Reset Link</button>

        <!-- ============================================================
             BACK TO LOGIN
             ============================================================ -->
        <p class="login-redirect">
            Remember your password?
            <a href="./login.html">Back to Login</a>
        </p>

        <!-- ============================================================
             OPTIONAL FIELDS (commented out — uncomment to activate)
             ============================================================ -->

        <!-- ============================================================
             USERNAME (OPTIONAL)
             ============================================================ -->

        <!--
        <div class="form-group">
            <label for="username">Username</label>
            <input
                type="text"
                id="username"
                name="username"
                placeholder="Enter your username"
                autocomplete="username"
            />
        </div>
        -->

        <!-- ============================================================
             PHONE NUMBER (OPTIONAL)
             ============================================================ -->

        <!--
        <div class="form-group">
            <label for="phone">Phone Number</label>
            <input
                type="tel"
                id="phone"
                name="phone"
                placeholder="Enter your phone number"
                autocomplete="tel"
            />
        </div>
        -->

        <!-- ============================================================
             CNIC (OPTIONAL)
             ============================================================ -->

        <!--
        <div class="form-group">
            <label for="cnic">CNIC</label>
            <input
                type="text"
                id="cnic"
                name="cnic"
                placeholder="XXXXX-XXXXXXX-X"
                autocomplete="off"
            />
        </div>
        -->

    </form>

    <script type="module" src="../../js/authentication/forgotPassword.js"></script>

</body>

</html>
