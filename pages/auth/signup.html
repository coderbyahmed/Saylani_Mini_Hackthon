<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up</title>
    <link rel="stylesheet" href="../../css/auth/modern-style/signup.css" />
    <link rel="stylesheet" href="../../css/ui/toast.css">
    <link rel="stylesheet" href="../../css/ui/loader.css">

<body>

    <!-- ============================================================
         SIGNUP FORM
         ============================================================ -->
    <form id="signupForm" method="post" autocomplete="on">

        <!-- ============================================================
             AUTH HEADER
             ============================================================ -->
        <div class="auth-header">

            <span class="auth-badge">
                ✨ Welcome
            </span>

            <h1 class="auth-title">
                Create Account
            </h1>

            <p class="auth-description">
                Create your account to access all features and continue using the application.
            </p>

        </div>

        <!-- ============================================================
             ACTIVE AUTHENTICATION FIELDS
             ============================================================ -->

        <!-- Full Name -->
        <div class="form-group">
            <label for="fullName">Full Name</label>
            <input type="text" id="fullName" name="fullName" placeholder="Enter your full name" autocomplete="name" />
        </div>

        <!-- Email Address -->
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" placeholder="Enter your email address" autocomplete="email" />
        </div>

        <!-- Password -->
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Enter your password"
                autocomplete="new-password" />

            <button type="button" class="eye-toggle" aria-label="Toggle password visibility"></button>
        </div>

        <!-- Confirm Password -->
        <div class="form-group">
            <label for="confirmPassword">Confirm Password</label>
            <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm your password"
                autocomplete="new-password" />

            <button type="button" class="eye-toggle" aria-label="Toggle password visibility"></button>
        </div>

        <!-- ============================================================
             FUTURE OPTIONAL FIELDS (commented out — uncomment during
             Hackathon to activate)
             ============================================================ -->
