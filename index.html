<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Saylani Mini Hackathon</title>
    <link rel="stylesheet" href="css/ui/loader.css" />
    <style>
        html, body {
            height: 100%;
            margin: 0;
            background: #0f172a;
        }
    </style>
</head>
<body>

    <div class="loader loader--active" id="loader">
        <div class="loader__spinner"></div>
        <p class="loader__text">Loading...</p>
    </div>

    <script type="module">
        import { auth } from "./js/configuration/firebase.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";

        onAuthStateChanged(auth, (user) => {
            if (user) {
                window.location.replace("pages/dashboard/dashboard.html");
            } else {
                window.location.replace("pages/auth/signup.html");
            }
        });
    </script>

</body>
</html>
